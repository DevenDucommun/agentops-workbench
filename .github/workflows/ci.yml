name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Public-readiness scan
        run: ./bin/agentops scan-publication

      - name: Large session smoke test
        run: bun run smoke:large-session

      - name: Dashboard smoke test
        run: bun run smoke:dashboard

      - name: CLI smoke test
        run: |
          ./bin/agentops config --check > /tmp/agentops-config-check.txt
          ./bin/agentops audit ./fixtures/sample-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/claude-code-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/codex-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/codex-exec-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/codex-exec-edge-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/claude-code-stream-edge-session.jsonl --quiet
          ./bin/agentops audit ./fixtures/usage-session.jsonl --quiet
          ./bin/agentops adapters > /tmp/agentops-adapters.md
          ./bin/agentops adapters --input ./fixtures/codex-session.jsonl > /tmp/agentops-adapter-detection.md
          ./bin/agentops adapters --input ./fixtures/codex-exec-session.jsonl > /tmp/agentops-codex-exec-detection.md
          ./bin/agentops adapters --input ./fixtures/codex-exec-edge-session.jsonl > /tmp/agentops-codex-exec-edge-detection.md
          ./bin/agentops adapters --input ./fixtures/claude-code-stream-edge-session.jsonl > /tmp/agentops-claude-edge-detection.md
          ./bin/agentops sessions > /tmp/agentops-sessions.md
          ./bin/agentops look --session latest > /tmp/agentops-look.md
          ./bin/agentops save report --session latest --out /tmp/agentops-report.md
          ./bin/agentops save json --session latest --out /tmp/agentops-export.json
          ./bin/agentops save json --repo --session latest --out /tmp/agentops-repo-export.json
          ./bin/agentops save json --format openinference --session latest --out /tmp/agentops-openinference.json
          ./bin/agentops save pr --session latest --out /tmp/agentops-github-comment.md
          ./bin/agentops check --session latest --format github --out /tmp/agentops-gate-github.md
          ./bin/agentops open --check > /tmp/agentops-dashboard-check.txt
          ./bin/agentops scan-publication > /tmp/agentops-publication-scan.txt
          test -s /tmp/agentops-config-check.txt
          test -s /tmp/agentops-adapters.md
          test -s /tmp/agentops-adapter-detection.md
          test -s /tmp/agentops-codex-exec-detection.md
          test -s /tmp/agentops-codex-exec-edge-detection.md
          test -s /tmp/agentops-claude-edge-detection.md
          test -s /tmp/agentops-sessions.md
          test -s /tmp/agentops-look.md
          test -s /tmp/agentops-report.md
          test -s /tmp/agentops-export.json
          test -s /tmp/agentops-repo-export.json
          test -s /tmp/agentops-openinference.json
          test -s /tmp/agentops-github-comment.md
          test -s /tmp/agentops-gate-github.md
          test -s /tmp/agentops-dashboard-check.txt
          test -s /tmp/agentops-publication-scan.txt
